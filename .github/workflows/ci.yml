name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: PYTHONPATH=src pytest tests/unit/ -v
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs

  e2e:
    runs-on: ubuntu-latest
    needs: [unit]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: googledocs
          POSTGRES_PASSWORD: googledocs
          POSTGRES_DB: googledocs
        options: >-
          --health-cmd "pg_isready -U googledocs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs
      APP_PORT: 8010
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs
      - name: Start server
        run: |
          uvicorn googledocs.main:app --host 0.0.0.0 --port 8010 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8010/healthz > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs
      - name: Acceptance tests
        run: API_BASE_URL=http://localhost:8010 pytest verify/acceptance/ -v
      - name: Stop server
        if: always()
        run: kill $(lsof -t -i:8010) 2>/dev/null || true
