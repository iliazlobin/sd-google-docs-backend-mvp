name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_PORT: 8010

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/ verify/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: googledocs
          POSTGRES_PASSWORD: googledocs
          POSTGRES_DB: googledocs
        options: >-
          --health-cmd pg_isready -U googledocs
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -v
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs
          REDIS_URL: redis://localhost:6379/0

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build .

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from example
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up -d --wait --build
      - name: Run database migrations
        run: docker compose run --rm app alembic upgrade head
      - name: Acceptance tests
        run: API_BASE_URL=http://localhost:${APP_PORT:-8010} pytest verify/acceptance/ -v
      - name: Teardown
        if: always()
        run: docker compose down --volumes
