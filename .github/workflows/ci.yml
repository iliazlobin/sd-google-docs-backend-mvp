name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_PORT: 8010

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: PYTHONPATH=src pytest tests/unit/ -v
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs

  e2e:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-docker-action@v3
      - name: Create .env from example
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up -d --wait --build
      - name: Run database migrations
        run: docker compose run --rm app alembic upgrade head
      - name: Acceptance tests
        run: API_BASE_URL=http://localhost:${APP_PORT:-8010} pytest verify/acceptance/ -v
      - name: Teardown
        if: always()
        run: docker compose down --volumes
