name: Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: googledocs
          POSTGRES_PASSWORD: googledocs
          POSTGRES_DB: googledocs
        options: >-
          --health-cmd "pg_isready -U googledocs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs
      - name: Run functional tests
        run: pytest tests/functional/ -v
        env:
          DB_URL: postgresql+asyncpg://googledocs:googledocs@localhost:5432/googledocs
          REDIS_URL: redis://localhost:6379/0
