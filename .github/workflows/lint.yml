name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.20"
      - name: Check formatting
        run: ruff format --check src/ tests/ verify/
      - name: Lint
        run: ruff check src/ tests/ verify/
